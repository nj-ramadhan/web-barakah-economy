# Docker Compose for Barakah Economy
# NOTE: To allow large file uploads (PDFs/Images), ensure your Nginx proxy 
# (either on host or as a container) has 'client_max_body_size 100M;'
version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: bae_postgres
    restart: always
    environment:
      POSTGRES_DB: bae_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BarakahEconomy2025!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bae_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bae_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bae_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_NAME=bae_db
      - DB_USER=postgres
      - DB_PASSWORD=BarakahEconomy2025!
      - DB_PORT=5432
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - bae_network
    volumes:
      - ./backend/static:/app/static
      - ./backend/media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_BASE_URL=https://api.barakah.cloud
    container_name: bae_frontend
    restart: always
    ports:
      - "3001:3001"
    networks:
      - bae_network

  rtmp:
    image: tiangolo/nginx-rtmp
    container_name: bae_rtmp
    restart: always
    ports:
      - "1935:1935"
    volumes:
      - ./rtmp/nginx.conf:/etc/nginx/nginx.conf
      - ./backend/media/live:/opt/media/live
      - ./backend/media/recordings:/opt/media/recordings
    networks:
      - bae_network

  # --- MediaMTX: WebRTC/WHIP ingestor for live from HP/browser ---
  # OBS still uses nginx-rtmp (port 1935), this handles HP browser streams
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: bae_mediamtx
    restart: always
    environment:
      - MTX_PROTOCOLS=tcp
    ports:
      - "8889:8889"   # WebRTC / WHIP endpoint (browser live streaming)
      - "8888:8888"   # HLS output (viewers can watch HP stream)
      - "9997:9997"   # MediaMTX API (for Django backend status check)
      - "8189:8189/udp" # WebRTC UDP media port (for audio/video data)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    networks:
      - bae_network

networks:
  bae_network:
    driver: bridge

volumes:
  postgres_data:
