# barakah_app/backend/nixpacks.toml

[phases.setup]
nixPkgs = ["python3", "postgresql_16.dev", "gcc"]

[phases.install]
# Perintah install yang bersih tanpa backslash yang bermasalah
cmds = [
    "python3 -m venv /opt/venv && sleep 2 && /opt/venv/bin/pip install --upgrade pip && /opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Menjalankan collectstatic saat build
cmds = ["/opt/venv/bin/python manage.py collectstatic --noinput"]

[start]
# Perintah start yang benar menggunakan barakah_app.wsgi
cmd = "gunicorn barakah_app.wsgi:application --bind 0.0.0.0:8000"
