worker_processes auto;
rtmp_auto_push on;
events {}
rtmp {
    server {
        listen 1935;
        listen [::]:1935 ipv6only=on;

        application live {
            live on;
            
            # Konfigurasi HLS Dioptimalkan untuk Low-Latency (Delay ~2-4 detik)
            hls on;
            hls_path /opt/media/live;
            hls_fragment 1s;
            hls_playlist_length 5s;
            hls_cleanup on;

            # Konfigurasi Perekaman Otomatis (Auto Recording)
            record all;
            record_path /opt/media/recordings;
            record_unique on;
            record_suffix _recorded.flv;
        }
    }
}
