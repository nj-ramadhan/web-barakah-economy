# Konfigurasi Nginx untuk Barakah Economy di VPS
# Lokasi file: /etc/nginx/sites-available/barakah

# 1. Frontend (barakah.cloud)
server {
    listen 80;
    server_name barakah.cloud www.barakah.cloud;

    location / {
        client_max_body_size 100M;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. Backend API (api.barakah.cloud)
server {
    listen 80;
    client_max_body_size 100M;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (optional, jika ingin dilayani Nginx langsung)
    location /static/ {
        alias /path/to/barakah_app/backend/static/;
    }

    # Media files
    location /media/ {
        alias /path/to/barakah_app/backend/media/;
    }
}
